# .github/workflows/deploy-docs.yml
#
# Builds and deploys the MuzaLife Backend documentation to GitHub Pages.
#
# Triggered on every push to main.  Also runnable manually via
# Actions → "Run workflow".
#
# What it does:
#   1. Run living-documentation tests (npm run test:docs)
#   2. Generate JSDoc HTML (npm run docs)
#   3. Build the VitePress site (docs-site/)
#   4. Copy the JSDoc output into the built site as /jsdoc/
#   5. Deploy to GitHub Pages
#
# Live at: https://vladimikoroviakov.github.io/muzalife_backend/

name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run living-documentation tests
        run: npm run test:docs
        env:
          JWT_SECRET: ci-test-secret

      - name: Generate JSDoc HTML
        run: npm run docs

      - name: Create docs archive
        run: npm run docs:archive

      - name: Build VitePress site
        run: npx vitepress build docs-site
        env:
          NODE_ENV: production

      - name: Copy JSDoc into VitePress output
        run: |
          mkdir -p docs-site/.vitepress/dist/jsdoc
          cp -r docs/jsdoc/* docs-site/.vitepress/dist/jsdoc/
          touch docs-site/.vitepress/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
