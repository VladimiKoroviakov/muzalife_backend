# .github/workflows/deploy-docs.yml
#
# Builds the MuzaLife Backend documentation (VitePress + JSDoc).
#
# Triggered on every push to main.  Also runnable manually via
# Actions → "Run workflow".
#
# What it does:
#   1. Generate JSDoc HTML (npm run docs)
#   2. Run living-documentation tests (npm run test:docs)
#   3. Build the VitePress site (docs-site/)
#   4. Copy the JSDoc output into the built site as /jsdoc/
#   5. Upload the built site as a Pages artifact (for manual review)

name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run living-documentation tests
        run: npm run test:docs
        env:
          JWT_SECRET: ci-test-secret

      - name: Generate JSDoc HTML
        run: npm run docs

      - name: Create docs archive
        run: npm run docs:archive

      - name: Install VitePress
        run: npm install --save-dev vitepress

      - name: Build VitePress site
        run: npx vitepress build docs-site
        env:
          NODE_ENV: production

      - name: Copy JSDoc into VitePress output
        run: |
          mkdir -p docs-site/.vitepress/dist/jsdoc
          cp -r docs/jsdoc/* docs-site/.vitepress/dist/jsdoc/

      - name: Upload built docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs-site/.vitepress/dist
          retention-days: 7
