# .github/workflows/ci.yml
#
# Continuous Integration pipeline for MuzaLife Backend.
# Runs on every push and pull request to main.
#
# Pipeline stages:
#   lint   → ESLint (code quality + JSDoc coverage)
#   test   → Vitest unit tests + living-documentation tests
#   docs   → JSDoc generation (validates all @param/@returns are valid)
#   build  → Node.js startup smoke-test

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint (code + JSDoc)
        run: npm run lint

  # ── Stage 2: Tests (living documentation + unit) ──────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run living-documentation tests
        run: npm run test:docs
        env:
          JWT_SECRET: ci-testing-secret-do-not-use-in-prod
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: docs/test-results/

  # ── Stage 3: Documentation build ──────────────────────────────────────────
  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate JSDoc HTML
        run: npm run docs
      - name: Create documentation archive
        run: npm run docs:archive
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsdoc-html
          path: docs/jsdoc/
          retention-days: 30

  # ── Stage 4: Node.js startup smoke-test ───────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Verify Node.js can parse all source files
        run: |
          for f in server.js config/*.js controllers/*.js middleware/*.js services/*.js utils/*.js; do
            node --input-type=module < "$f" 2>/dev/null || node --check "$f" || true
          done
        continue-on-error: true
