# =============================================================================
# MuzaLife Backend — Docker Compose
#
# Starts the backend API and a PostgreSQL database together.
#
# Usage:
#   docker compose up -d           # start in background
#   docker compose logs -f backend # tail logs
#   docker compose down            # stop and remove containers
#   docker compose down -v         # also remove volumes (deletes DB data!)
# =============================================================================

version: "3.9"

services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: muzalife-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-muzalife}
      POSTGRES_USER: ${DB_USER:-muzalife_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - muzalife_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-muzalife_user} -d ${DB_NAME:-muzalife}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: muzalife-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5001}
      DB_HOST: db          # use service name, not localhost
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-muzalife}
      DB_USER: ${DB_USER:-muzalife_user}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-https://localhost:5001}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_POSTING_APP_ID: ${FACEBOOK_POSTING_APP_ID:-}
      FACEBOOK_POSTING_APP_SECRET: ${FACEBOOK_POSTING_APP_SECRET:-}
      FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID:-}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY:-}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY:-}
    volumes:
      - ./certs:/app/certs:ro          # SSL certificates (read-only)
      - muzalife_uploads:/app/uploads  # persistent user uploads
    ports:
      - "${PORT:-5001}:${PORT:-5001}"

  # ── DB setup (runs once and exits) ────────────────────────────────────────
  db-setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: muzalife-db-setup
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-muzalife}
      DB_USER: ${DB_USER:-muzalife_user}
      DB_PASSWORD: ${DB_PASSWORD}
    command: ["node", "scripts/setupDatabase.js"]
    restart: "no"

volumes:
  muzalife_pgdata:
    driver: local
  muzalife_uploads:
    driver: local
